<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#f8fafc">Agent Observatory — Architecture</text>

  <!-- Dashboard Panel -->
  <rect x="60" y="65" width="780" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Agent Observatory Dashboard</text>

  <!-- Dashboard Cards -->
  <rect x="85" y="105" width="150" height="65" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
  <text x="160" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3b82f6">Permission</text>
  <text x="160" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3b82f6">Landscape</text>

  <rect x="255" y="105" width="150" height="65" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1" opacity="0.9"/>
  <text x="330" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#22c55e">Audit Trail</text>
  <text x="330" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#22c55e">(Real-time)</text>

  <rect x="425" y="105" width="150" height="65" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
  <text x="500" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a855f7">Token Lifecycle</text>
  <text x="500" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a855f7">Debugger</text>

  <rect x="595" y="105" width="150" height="65" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="670" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f97316">OWASP Risk</text>
  <text x="670" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f97316">Dashboard</text>

  <!-- Row 2 Cards -->
  <rect x="85" y="185" width="150" height="65" rx="8" fill="#0f172a" stroke="#eab308" stroke-width="1" opacity="0.9"/>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#eab308">Risk Metrics</text>
  <text x="160" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#eab308">&amp; Gauges</text>

  <rect x="255" y="185" width="150" height="65" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
  <text x="330" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#06b6d4">Connection</text>
  <text x="330" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#06b6d4">Health Monitor</text>

  <rect x="425" y="185" width="150" height="65" rx="8" fill="#0f172a" stroke="#ec4899" stroke-width="1" opacity="0.9"/>
  <text x="500" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#ec4899">Agent Chat</text>
  <text x="500" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#ec4899">+ Live Feed</text>

  <rect x="595" y="185" width="150" height="65" rx="8" fill="#0f172a" stroke="#14b8a6" stroke-width="1" opacity="0.9"/>
  <text x="670" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#14b8a6">Revoke</text>
  <text x="670" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#14b8a6">Controls</text>

  <!-- Connection Lines from Dashboard to Auth0 Layer -->
  <line x1="250" y1="265" x2="200" y2="330" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="450" y1="265" x2="450" y2="330" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="650" y1="265" x2="700" y2="330" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Arrow markers -->
  <text x="450" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">▼ Instrumented Tool Calls ▼</text>

  <!-- Auth0 Layer -->
  <rect x="60" y="330" width="240" height="130" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#3b82f6">Token Vault</text>
  <text x="180" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">RFC 8693 Token Exchange</text>
  <!-- Service icons -->
  <rect x="80" y="390" width="60" height="28" rx="6" fill="#3b82f620" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="409" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3b82f6">Google</text>
  <rect x="150" y="390" width="60" height="28" rx="6" fill="#a855f720" stroke="#a855f7" stroke-width="1"/>
  <text x="180" y="409" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a855f7">GitHub</text>
  <rect x="220" y="390" width="60" height="28" rx="6" fill="#22c55e20" stroke="#22c55e" stroke-width="1"/>
  <text x="250" y="409" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#22c55e">Slack</text>
  <text x="180" y="445" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">3 Services × Token Vault</text>

  <rect x="330" y="330" width="240" height="130" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f97316">Step-Up Auth</text>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Interrupt-as-Circuit-Breaker</text>
  <text x="450" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Risk Classification</text>
  <text x="450" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">→ Threshold Check</text>
  <text x="450" y="436" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">→ User Confirmation</text>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Pattern 3 (OWASP ASI09)</text>

  <rect x="600" y="330" width="240" height="130" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="720" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#22c55e">FGA / ReBAC</text>
  <text x="720" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">OpenFGA Authorization</text>
  <text x="720" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Service-level Access</text>
  <text x="720" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Document-level Control</text>
  <text x="720" y="436" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">User ↔ Service Relations</text>
  <text x="720" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">OWASP ASI06 Mitigation</text>

  <!-- Bottom: Three Patterns -->
  <rect x="60" y="490" width="780" height="110" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f8fafc">Three Authorization Patterns</text>

  <rect x="80" y="530" width="230" height="55" rx="8" fill="#1e293b" stroke="#3b82f640" stroke-width="1"/>
  <text x="195" y="550" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Pattern 1</text>
  <text x="195" y="570" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Credential-Event Correlation</text>

  <rect x="335" y="530" width="230" height="55" rx="8" fill="#1e293b" stroke="#f9731640" stroke-width="1"/>
  <text x="450" y="550" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#f97316">Pattern 2</text>
  <text x="450" y="570" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Scope-Bound Risk Classification</text>

  <rect x="590" y="530" width="230" height="55" rx="8" fill="#1e293b" stroke="#22c55e40" stroke-width="1"/>
  <text x="705" y="550" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#22c55e">Pattern 3</text>
  <text x="705" y="570" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Interrupt-as-Circuit-Breaker</text>
</svg>
