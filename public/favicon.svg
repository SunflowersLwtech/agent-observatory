<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring (mater) -->
  <circle cx="32" cy="32" r="29" stroke="#C8A96E" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="26" stroke="#C8A96E" stroke-width="0.8" opacity="0.5"/>

  <!-- Degree tick marks around outer ring -->
  <g stroke="#C8A96E" stroke-width="1" opacity="0.4">
    <line x1="32" y1="3" x2="32" y2="7"/>
    <line x1="32" y1="57" x2="32" y2="61"/>
    <line x1="3" y1="32" x2="7" y2="32"/>
    <line x1="57" y1="32" x2="61" y2="32"/>
    <!-- diagonals -->
    <line x1="11.5" y1="11.5" x2="14.3" y2="14.3"/>
    <line x1="52.5" y1="11.5" x2="49.7" y2="14.3"/>
    <line x1="11.5" y1="52.5" x2="14.3" y2="49.7"/>
    <line x1="52.5" y1="52.5" x2="49.7" y2="49.7"/>
  </g>

  <!-- Rete (star map) - ecliptic off-center circle -->
  <circle cx="32" cy="28" r="18" stroke="#7BA7BC" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- Tropic circles -->
  <circle cx="32" cy="32" r="14" stroke="#C8A96E" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.35"/>
  <circle cx="32" cy="32" r="8" stroke="#C8A96E" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.35"/>

  <!-- Rule (alidade) - the pointer -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#E8D5A3" stroke-width="1.2" opacity="0.3"/>
  <line x1="10" y1="22" x2="54" y2="42" stroke="#7BA7BC" stroke-width="1" opacity="0.25"/>

  <!-- Star pointers on rete -->
  <circle cx="22" cy="20" r="1.8" fill="#E8D5A3"/>
  <circle cx="43" cy="24" r="1.5" fill="#E8D5A3"/>
  <circle cx="38" cy="14" r="1.3" fill="#7BA7BC"/>
  <circle cx="18" cy="33" r="1.2" fill="#E8D5A3" opacity="0.8"/>
  <circle cx="44" cy="36" r="1" fill="#7BA7BC" opacity="0.7"/>

  <!-- Center pin -->
  <circle cx="32" cy="32" r="2.5" fill="#1A1A2E" stroke="#C8A96E" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="0.8" fill="#C8A96E"/>

  <!-- Subtle glow on stars -->
  <circle cx="22" cy="20" r="3.5" fill="#E8D5A3" opacity="0.12"/>
  <circle cx="43" cy="24" r="3" fill="#E8D5A3" opacity="0.1"/>
</svg>
